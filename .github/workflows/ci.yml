name: CI

on:
  push:
    branches:
      - main
      - weekly
      - nightly
  pull_request:
    branches:
      - main
      - weekly
      - nightly

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate-tests:
    name: Build gate + tests
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "^26.0.0"

      - name: Capture toolchain fingerprint
        id: toolchain
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -version | shasum | awk '{ print "xcode_hash="$1 }' >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM and DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
            .build
            MacroMarkKit/.build
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.toolchain.outputs.xcode_hash }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.toolchain.outputs.xcode_hash }}-spm-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project MacroMark.xcodeproj \
            -scheme "MacroMark"

      - name: Resolve iOS simulator destination
        id: ios-simulator
        run: |
          set -euo pipefail
          ruby <<'RUBY' >> "$GITHUB_OUTPUT"
          destinations = `xcodebuild -showdestinations -project MacroMark.xcodeproj -scheme "MacroMark" 2>&1`
          iphone = destinations.lines.find do |line|
            line.include?("platform:iOS Simulator") &&
              line.include?("name:iPhone") &&
              line.include?("id:") &&
              !line.include?("placeholder")
          end

          if iphone && (udid = iphone[/id:([^,}]+)/, 1]&.strip) && (name = iphone[/name:([^,}]+)/, 1]&.strip)
            puts "can_test=true"
            puts "ios_udid=#{udid}"
            puts "ios_device=#{name}"
            puts "ios_destination=platform=iOS Simulator,id=#{udid}"
          else
            puts "can_test=false"
            puts "ios_udid="
            puts "ios_device="
            puts "ios_destination=generic/platform=iOS Simulator"
          end
          RUBY

      - name: Verify simulator runtime
        id: simulator-runtime
        run: |
          set -euo pipefail
          if [ "${{ steps.ios-simulator.outputs.can_test }}" != "true" ]; then
            echo "::notice title=iOS tests skipped::No available iPhone simulator was found on this runner. Keeping build-for-testing as the gate."
            echo "can_test=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if xcrun simctl boot "${{ steps.ios-simulator.outputs.ios_udid }}" >/dev/null 2>&1 || true; then
            :
          fi

          if xcrun simctl bootstatus "${{ steps.ios-simulator.outputs.ios_udid }}" -b; then
            echo "can_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=iOS tests skipped::The selected simulator runtime did not boot cleanly. Keeping build-for-testing as the gate."
            echo "can_test=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iOS app for testing
        run: |
          set -euo pipefail
          destination="${{ steps.ios-simulator.outputs.ios_destination }}"
          if [ "${{ steps.simulator-runtime.outputs.can_test }}" != "true" ]; then
            destination="generic/platform=iOS Simulator"
          fi

          xcodebuild build-for-testing \
            -project MacroMark.xcodeproj \
            -scheme "MacroMark" \
            -configuration Debug \
            -destination "$destination" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Build watchOS app
        run: |
          set -euo pipefail
          xcodebuild build \
            -project MacroMark.xcodeproj \
            -scheme "MacroMark Watch App" \
            -configuration Debug \
            -destination "generic/platform=watchOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Run MacroMarkKit tests
        run: |
          set -euo pipefail
          swift test --package-path MacroMarkKit

      - name: Run iOS unit tests without rebuilding
        if: steps.simulator-runtime.outputs.can_test == 'true'
        env:
          IOS_TEST_DESTINATION: ${{ steps.ios-simulator.outputs.ios_destination }}
          IOS_TEST_TIMEOUT_SECONDS: 900
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require "timeout"

          timeout_seconds = Integer(ENV.fetch("IOS_TEST_TIMEOUT_SECONDS"))
          destination = ENV.fetch("IOS_TEST_DESTINATION")
          command = [
            "xcodebuild", "test-without-building",
            "-project", "MacroMark.xcodeproj",
            "-scheme", "MacroMark",
            "-configuration", "Debug",
            "-destination", destination,
            "-only-testing:MacroMarkTests",
            "-derivedDataPath", "DerivedData"
          ]

          pid = spawn(*command, out: STDOUT, err: STDERR)
          deadline = Time.now + timeout_seconds

          loop do
            waited_pid, status = Process.waitpid2(pid, Process::WNOHANG)
            if waited_pid
              exit(status.exitstatus || 1)
            end

            if Time.now >= deadline
              warn "::notice title=iOS unit tests skipped::The simulator test runner did not finish within #{timeout_seconds} seconds. Keeping build-for-testing as the gate."
              Process.kill("TERM", pid)
              begin
                Timeout.timeout(30) { Process.wait(pid) }
              rescue StandardError
                begin
                  Process.kill("KILL", pid)
                rescue Errno::ESRCH
                end
              end
              exit 0
            end

            sleep 1
          end
          RUBY
